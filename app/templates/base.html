<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}工事管理{% endblock %} | 不動産工事管理アプリ</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a href="{{ url_for('main.dashboard') }}">🏗 不動産工事管理</a>
    </div>
    <nav class="mainnav">
      <a href="{{ url_for('main.dashboard') }}">ダッシュボード</a>
      <a href="{{ url_for('main.construction_list') }}">工事一覧</a>
      <a href="{{ url_for('main.construction_new') }}">新規登録</a>
      <a href="{{ url_for('main.master_index') }}">マスタ</a>
      <a href="{{ url_for('main.import_view') }}">インポート</a>
      <a href="{{ url_for('main.export_view') }}">出力</a>
      <a href="{{ url_for('main.backup_view') }}">バックアップ</a>
      <a href="{{ url_for('main.settings_view') }}">設定</a>
    </nav>
  </header>

  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flashes">
          {% for category, msg in messages %}
            <div class="flash flash-{{ category }}">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <small>© 不動産工事管理アプリ v1.0 (社内ツール)</small>
  </footer>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
