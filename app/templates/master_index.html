{% extends "base.html" %}
{% block title %}マスタ管理{% endblock %}
{% block content %}
<h1>マスタ管理</h1>
<div class="card">
  <p>登録するマスタを選択してください。</p>
  <ul>
    {% for key, (label, cols) in masters.items() %}
      <li><a href="{{ url_for('main.master', table=key) }}">{{ label }}</a></li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
