{% extends "base.html" %}
{% block title %}設定{% endblock %}
{% block content %}
<h1>設定</h1>

<div class="card">
  <form method="post">
    <div class="form-grid">
      <div class="field">
        <label>データ保存先 (data_root)</label>
        <input type="text" name="data_root" value="{{ settings.data_root }}">
        <small class="muted">例: C:/工事管理データ または //server/share/工事管理</small>
      </div>
      <div class="field">
        <label>工事 ID プレフィックス</label>
        <input type="text" name="id_prefix" value="{{ settings.id_prefix }}">
      </div>
      <div class="field">
        <label>採番リセット</label>
        <select name="id_reset_mode">
          <option value="calendar_year" {% if settings.id_reset_mode=='calendar_year' %}selected{% endif %}>暦年 (1月リセット)</option>
          <option value="fiscal_year" {% if settings.id_reset_mode=='fiscal_year' %}selected{% endif %}>年度 (4月リセット)</option>
        </select>
      </div>
      <div class="field">
        <label>既定文字コード</label>
        <select name="default_encoding">
          <option value="utf-8-sig" {% if settings.default_encoding=='utf-8-sig' %}selected{% endif %}>UTF-8 (BOM付)</option>
          <option value="cp932" {% if settings.default_encoding=='cp932' %}selected{% endif %}>Shift_JIS (CP932)</option>
        </select>
      </div>
      <div class="field">
        <label>バックアップ保持世代数</label>
        <input type="number" name="backup_retention" value="{{ settings.backup_retention }}" min="1">
      </div>
      <div class="field">
        <label>添付ファイル サイズ上限 (MB)</label>
        <input type="number" name="max_attachment_mb" value="{{ settings.max_attachment_mb }}" min="1">
      </div>
      <div class="field">
        <label>終了時自動バックアップ</label>
        <label style="font-weight:normal;margin-top:6px;">
          <input type="checkbox" name="auto_backup_on_exit" value="1"
                 {% if settings.auto_backup_on_exit %}checked{% endif %}> 有効
        </label>
      </div>
    </div>
    <div class="toolbar" style="margin-top:12px;">
      <button class="btn btn-success" type="submit">設定を保存</button>
    </div>
  </form>
</div>

<div class="card">
  <h3>現在の設定 (JSON)</h3>
  <pre style="background:#f5f7fa;padding:10px;border-radius:4px;overflow:auto;">{{ settings|tojson(indent=2) }}</pre>
  <p class="muted">設定ファイル: <code>data/config/settings.json</code></p>
</div>
{% endblock %}
